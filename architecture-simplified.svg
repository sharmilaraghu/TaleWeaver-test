<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1640 740" width="1640" height="740"
     font-family="'Inter', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#5f6368"/>
    </marker>
    <marker id="ah-l" markerWidth="9" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polygon points="9 0, 0 3.5, 9 7" fill="#5f6368"/>
    </marker>
    <marker id="ah-teal" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#00838f"/>
    </marker>
    <marker id="ah-teal-l" markerWidth="9" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polygon points="9 0, 0 3.5, 9 7" fill="#00838f"/>
    </marker>
    <marker id="ah-pur" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#7b1fa2"/>
    </marker>
    <marker id="ah-grn" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#2e7d32"/>
    </marker>
    <marker id="ah-grn-l" markerWidth="9" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polygon points="9 0, 0 3.5, 9 7" fill="#2e7d32"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1640" height="740" fill="#f2f4f8" rx="16"/>

  <!-- Title -->
  <text x="820" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a2e">TaleWeaver — High-Level Architecture</text>
  <text x="820" y="60" text-anchor="middle" font-size="11" fill="#5f6368">Voice-first interactive storytelling · Google Cloud Run · Gemini Live API · Vertex AI</text>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- CHILD                                                      -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <circle cx="72" cy="178" r="28" fill="#546e7a" filter="url(#shadow)"/>
  <path d="M 26,252 Q 26,218 72,218 Q 118,218 118,252 L 118,276 L 26,276 Z" fill="#546e7a"/>
  <text x="72" y="300" text-anchor="middle" font-size="13" font-weight="700" fill="#37474f">Child</text>
  <rect x="26" y="316" width="92" height="24" rx="12" fill="#e3f2fd" stroke="#90caf9" stroke-width="1"/>
  <text x="72" y="333" text-anchor="middle" font-size="11" fill="#1565c0">🎤 Voice</text>
  <rect x="26" y="348" width="92" height="24" rx="12" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1"/>
  <text x="72" y="365" text-anchor="middle" font-size="11" fill="#2e7d32">📖 Listen</text>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- BROWSER                                                    -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <rect x="148" y="80" width="240" height="400" rx="12" fill="white" stroke="#f9a825" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="148" y="80" width="240" height="46" rx="12" fill="#f9a825"/>
  <rect x="148" y="112" width="240" height="14" fill="#f9a825"/>
  <rect x="162" y="90" width="32" height="26" rx="5" fill="rgba(255,255,255,0.35)"/>
  <text x="178" y="107" text-anchor="middle" font-size="12" font-weight="800" fill="white">B</text>
  <text x="208" y="110" font-size="14" font-weight="700" fill="white">Browser</text>
  <text x="165" y="136" font-size="10" fill="#e65100" font-weight="600">React 19 + Vite + TypeScript</text>

  <line x1="162" y1="148" x2="376" y2="148" stroke="#f9a825" stroke-width="1" stroke-dasharray="4,3"/>

  <text x="162" y="166" font-size="10" font-weight="700" fill="#bf360c">Audio Pipeline</text>
  <text x="162" y="182" font-size="10" fill="#555">• Mic → 16 kHz PCM → WebSocket</text>
  <text x="162" y="197" font-size="10" fill="#555">• WebSocket → 24 kHz PCM → speakers</text>
  <text x="162" y="212" font-size="10" fill="#555">• AudioBufferSourceNode scheduling</text>
  <text x="162" y="227" font-size="10" fill="#555">• AudioContext resume on mic start</text>

  <line x1="162" y1="238" x2="376" y2="238" stroke="#f9a825" stroke-width="1" stroke-dasharray="4,3"/>

  <text x="162" y="255" font-size="10" font-weight="700" fill="#bf360c">Screen Flow</text>
  <text x="162" y="271" font-size="10" fill="#555">• Landing → CharacterSelect (🏠)</text>
  <text x="162" y="286" font-size="10" fill="#555">• ThemeSelect (🏠) → StoryScreen (🏠)</text>
  <text x="162" y="301" font-size="10" fill="#555">• StoryRecapModal · PastAdventuresModal</text>
  <text x="162" y="316" font-size="10" fill="#555">• 10 storytellers · 6 languages</text>
  <text x="162" y="331" font-size="10" fill="#555">• Badge overlay · Scene grid</text>

  <line x1="162" y1="342" x2="376" y2="342" stroke="#f9a825" stroke-width="1" stroke-dasharray="4,3"/>

  <text x="162" y="358" font-size="10" font-weight="700" fill="#bf360c">Gallery</text>
  <text x="162" y="374" font-size="10" fill="#555">• Stories saved to localStorage</text>
  <text x="162" y="389" font-size="10" fill="#555">• Title · images · narrations · badges</text>
  <text x="162" y="404" font-size="10" fill="#555">• Past Adventures modal on landing</text>
  <text x="162" y="425" font-size="10" fill="#aaa" font-style="italic">useLiveAPI · useStoryImages</text>
  <text x="162" y="439" font-size="10" fill="#aaa" font-style="italic">StoryRecapModal · PastAdventuresModal</text>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- CLOUD RUN                                                  -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <rect x="430" y="58" width="290" height="430" rx="12" fill="white" stroke="#34a853" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="430" y="58" width="290" height="46" rx="12" fill="#34a853"/>
  <rect x="430" y="90" width="290" height="14" fill="#34a853"/>
  <rect x="446" y="68" width="32" height="26" rx="5" fill="rgba(255,255,255,0.3)"/>
  <text x="462" y="85" text-anchor="middle" font-size="11" font-weight="800" fill="white">CR</text>
  <text x="510" y="86" font-size="14" font-weight="700" fill="white">Cloud Run</text>
  <text x="448" y="113" font-size="10" fill="#1b5e20" font-weight="600">FastAPI · Vite static files · Cloud Build CI/CD</text>

  <!-- WS Proxy section -->
  <rect x="442" y="126" width="266" height="160" rx="8" fill="#f1f8e9" stroke="#a5d6a7" stroke-width="1.5"/>
  <text x="452" y="145" font-size="10" font-weight="700" fill="#2e7d32">WebSocket Proxy  ·  /ws/story</text>
  <line x1="452" y1="151" x2="696" y2="151" stroke="#a5d6a7" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="452" y="168" font-size="10" fill="#555">• Bidirectional audio bridge to Gemini Live</text>
  <text x="452" y="183" font-size="10" fill="#555">• Injects character system prompt + voice</text>
  <text x="452" y="198" font-size="10" fill="#555">• Sends "Begin!" before proxy starts</text>
  <text x="452" y="213" font-size="10" fill="#555">• Forwards tool calls to browser</text>
  <text x="452" y="228" font-size="10" fill="#555">• 15 min session timeout</text>
  <text x="452" y="246" font-size="10" fill="#aaa" font-style="italic">proxy.py · characters.py</text>
  <text x="452" y="261" font-size="10" fill="#aaa" font-style="italic">build_gemini_setup_message</text>
  <text x="452" y="276" font-size="10" fill="#aaa" font-style="italic">proactive_audio · affective dialog · VAD</text>

  <!-- HTTP Endpoints section -->
  <rect x="442" y="300" width="266" height="174" rx="8" fill="#f1f8e9" stroke="#a5d6a7" stroke-width="1.5"/>
  <text x="452" y="318" font-size="10" font-weight="700" fill="#2e7d32">HTTP API Endpoints</text>
  <line x1="452" y1="324" x2="696" y2="324" stroke="#a5d6a7" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="452" y="341" font-size="10" fill="#555">POST  /api/story-opening</text>
  <text x="452" y="358" font-size="10" fill="#555">POST  /api/image</text>
  <text x="452" y="375" font-size="10" fill="#555">POST  /api/check-theme</text>
  <text x="452" y="392" font-size="10" fill="#555">POST  /api/sketch-preview</text>
  <text x="452" y="409" font-size="10" fill="#555">POST  /api/story-recap</text>
  <text x="452" y="426" font-size="10" fill="#555">POST  /api/story-plan  (ADK)</text>
  <text x="452" y="448" font-size="10" fill="#aaa" font-style="italic">image_gen.py · main.py</text>
  <text x="452" y="463" font-size="10" fill="#aaa" font-style="italic">All endpoints stateless · parallel-safe</text>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- GEMINI LIVE                                               -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <rect x="772" y="70" width="320" height="374" rx="12" fill="white" stroke="#00acc1" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="772" y="70" width="320" height="46" rx="12" fill="#00acc1"/>
  <rect x="772" y="102" width="320" height="14" fill="#00acc1"/>
  <rect x="786" y="80" width="32" height="26" rx="5" fill="rgba(255,255,255,0.3)"/>
  <text x="802" y="97" text-anchor="middle" font-size="10" font-weight="800" fill="white">GL</text>
  <text x="850" y="98" font-size="14" font-weight="700" fill="white">Gemini Live API</text>
  <text x="788" y="124" font-size="10" fill="#006064" font-weight="600">gemini-live-2.5-flash-native-audio</text>

  <text x="788" y="144" font-size="10" font-weight="700" fill="#00838f">Real-time Session</text>
  <text x="788" y="160" font-size="10" fill="#555">• Bidirectional WebSocket audio stream</text>
  <text x="788" y="176" font-size="10" fill="#555">• Input: 16 kHz PCM</text>
  <text x="788" y="192" font-size="10" fill="#555">• Output: 24 kHz PCM + transcription</text>
  <text x="788" y="208" font-size="10" fill="#555">• Barge-in (child interrupts mid-sentence)</text>
  <text x="788" y="224" font-size="10" fill="#555">• Proactive audio · affective dialog</text>
  <text x="788" y="240" font-size="10" fill="#555">• VAD · 2s silence timeout · LOW sensitivity</text>

  <line x1="788" y1="252" x2="1078" y2="252" stroke="#00acc1" stroke-width="1" stroke-dasharray="4,3"/>

  <text x="788" y="270" font-size="10" font-weight="700" fill="#00838f">Autonomous Tool Calls</text>
  <rect x="788" y="278" width="295" height="44" rx="6" fill="#e0f7fa" stroke="#00acc1" stroke-width="1"/>
  <text x="800" y="295" font-size="10" font-weight="700" fill="#006064">generate_illustration(scene_description)</text>
  <text x="800" y="312" font-size="9" fill="#555">Bypasses fallback rate limit · skip_extraction=true</text>
  <rect x="788" y="330" width="295" height="44" rx="6" fill="#e0f7fa" stroke="#00acc1" stroke-width="1"/>
  <text x="800" y="347" font-size="10" font-weight="700" fill="#006064">awardBadge(emoji, name, reason)</text>
  <text x="800" y="364" font-size="9" fill="#555">Only on explicit child verbal creativity · max 2/session</text>
  <text x="788" y="400" font-size="10" fill="#aaa" font-style="italic">Anti-repetition · content safety in system prompt</text>
  <text x="788" y="415" font-size="10" fill="#aaa" font-style="italic">10 unique voices · 6 languages</text>
  <text x="788" y="430" font-size="10" fill="#aaa" font-style="italic">Story never ends unless child says stop</text>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- VERTEX AI (wide, bottom)                                  -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <rect x="430" y="536" width="662" height="160" rx="12" fill="white" stroke="#7b1fa2" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="430" y="536" width="662" height="42" rx="12" fill="#7b1fa2"/>
  <rect x="430" y="564" width="662" height="14" fill="#7b1fa2"/>
  <rect x="446" y="546" width="32" height="24" rx="5" fill="rgba(255,255,255,0.3)"/>
  <text x="462" y="562" text-anchor="middle" font-size="10" font-weight="800" fill="white">VAI</text>
  <text x="492" y="563" font-size="14" font-weight="700" fill="white">Vertex AI — Gemini Models</text>

  <!-- Three sub-columns -->
  <line x1="642" y1="580" x2="642" y2="686" stroke="#ce93d8" stroke-width="1.5"/>
  <line x1="854" y1="580" x2="854" y2="686" stroke="#ce93d8" stroke-width="1.5"/>

  <!-- Col 1: Flash Lite -->
  <text x="442" y="597" font-size="10" font-weight="700" fill="#6a1b9a">Gemini 2.5 Flash Lite</text>
  <text x="442" y="614" font-size="10" fill="#555">Story opening + first image prewarm</text>
  <text x="442" y="630" font-size="10" fill="#555">Safety checks · sketch labels</text>
  <text x="442" y="646" font-size="10" fill="#555">ADK Story Planner model</text>
  <text x="442" y="662" font-size="10" fill="#555">4-beat story plan per session</text>
  <text x="442" y="678" font-size="10" fill="#aaa" font-style="italic">image_gen.py</text>

  <!-- Col 2: Image Gen -->
  <text x="658" y="597" font-size="10" font-weight="700" fill="#6a1b9a">Image Generation</text>
  <text x="658" y="614" font-size="10" fill="#555">Gemini Flash Image Preview</text>
  <text x="658" y="630" font-size="10" fill="#555">Storybook illustrations (4:3)</text>
  <text x="658" y="646" font-size="10" fill="#555">Visual continuity via prev image</text>
  <text x="658" y="662" font-size="10" fill="#555">Retry on 500 · 8s fallback rate</text>
  <text x="658" y="678" font-size="10" fill="#aaa" font-style="italic">SAFETY_PREFIX on all prompts</text>

  <!-- Col 3: Flash Recap -->
  <text x="870" y="597" font-size="10" font-weight="700" fill="#6a1b9a">Gemini Flash (Story Recap)</text>
  <text x="870" y="614" font-size="10" fill="#555">Receives actual session images</text>
  <text x="870" y="630" font-size="10" fill="#555">Narrates each scene in char voice</text>
  <text x="870" y="646" font-size="10" fill="#555">asyncio.gather (parallel)</text>
  <text x="870" y="662" font-size="10" fill="#555">Title + narrations → saved to gallery</text>
  <text x="870" y="678" font-size="10" fill="#aaa" font-style="italic">POST /api/story-recap</text>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- ARROWS                                                     -->
  <!-- ══════════════════════════════════════════════════════════ -->

  <!-- 1. Child ↔ Browser (voice bidirectional) -->
  <line x1="122" y1="248" x2="148" y2="248" stroke="#5f6368" stroke-width="1.8"
        stroke-dasharray="5,4" marker-end="url(#ah)" marker-start="url(#ah-l)"/>
  <text x="135" y="241" text-anchor="middle" font-size="8.5" fill="#666">voice</text>

  <!-- 2. Browser ↔ Cloud Run (WebSocket) -->
  <line x1="390" y1="278" x2="430" y2="278" stroke="#34a853" stroke-width="2"
        stroke-dasharray="6,4" marker-end="url(#ah-grn)" marker-start="url(#ah-grn-l)"/>
  <rect x="392" y="256" width="36" height="16" rx="3" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1"/>
  <text x="410" y="268" text-anchor="middle" font-size="8" fill="#2e7d32" font-weight="600">WS</text>

  <!-- 3. Cloud Run ↔ Gemini Live (WebSocket audio proxy) -->
  <!-- Upper arrow -->
  <line x1="722" y1="222" x2="772" y2="222" stroke="#00838f" stroke-width="2.2"
        stroke-dasharray="6,4" marker-end="url(#ah-teal)"/>
  <!-- Lower arrow -->
  <line x1="772" y1="246" x2="722" y2="246" stroke="#00838f" stroke-width="2.2"
        stroke-dasharray="6,4" marker-end="url(#ah-teal-l)"/>
  <!-- Label -->
  <rect x="722" y="208" width="50" height="48" rx="4" fill="#e0f7fa" stroke="#00acc1" stroke-width="1"/>
  <text x="747" y="224" text-anchor="middle" font-size="8" font-weight="700" fill="#006064">WebSocket</text>
  <text x="747" y="236" text-anchor="middle" font-size="8" fill="#006064">audio</text>
  <text x="747" y="248" text-anchor="middle" font-size="7.5" fill="#006064">proxy</text>

  <!-- 4. Tool calls: Gemini Live → Cloud Run (tool response) -->
  <path d="M 772,340 C 744,370 730,420 722,400" stroke="#00838f" stroke-width="1.8"
        stroke-dasharray="5,4" fill="none" marker-end="url(#ah-teal-l)"/>
  <text x="718" y="442" font-size="8.5" fill="#00838f" font-weight="600">tool calls</text>
  <text x="718" y="455" font-size="8" fill="#888">(→ /api/image)</text>

  <!-- 5. Cloud Run → Vertex AI (vertical, down) -->
  <line x1="565" y1="492" x2="565" y2="535" stroke="#7b1fa2" stroke-width="2"
        stroke-dasharray="6,4" marker-end="url(#ah-pur)"/>
  <rect x="440" y="499" width="170" height="24" rx="5" fill="#f3e5f5" stroke="#ab47bc" stroke-width="1"/>
  <text x="525" y="516" text-anchor="middle" font-size="8.5" font-weight="600" fill="#4a148c">HTTP (image · opening · recap · safety)</text>

  <!-- 6. Gemini Live → Vertex AI (diagonal) -->
  <path d="M 932,444 C 932,496 900,530 880,536" stroke="#7b1fa2" stroke-width="1.8"
        stroke-dasharray="5,4" fill="none" marker-end="url(#ah-pur)"/>
  <text x="950" y="495" font-size="8.5" fill="#7b1fa2" font-weight="600">model</text>
  <text x="950" y="507" font-size="8.5" fill="#7b1fa2" font-weight="600">inference</text>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- Legend                                                     -->
  <!-- ══════════════════════════════════════════════════════════ -->
  <rect x="1140" y="536" width="472" height="158" rx="10" fill="white" stroke="#ccc" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1376" y="558" text-anchor="middle" font-size="12" font-weight="700" fill="#333">Legend</text>

  <line x1="1160" y1="582" x2="1216" y2="582" stroke="#00838f" stroke-width="2" stroke-dasharray="6,4"
        marker-end="url(#ah-teal)" marker-start="url(#ah-teal-l)"/>
  <text x="1226" y="586" font-size="10" fill="#444">Real-time WebSocket (bidirectional)</text>

  <line x1="1160" y1="608" x2="1216" y2="608" stroke="#7b1fa2" stroke-width="2" stroke-dasharray="6,4"
        marker-end="url(#ah-pur)"/>
  <text x="1226" y="612" font-size="10" fill="#444">HTTP API call → Vertex AI</text>

  <line x1="1160" y1="634" x2="1216" y2="634" stroke="#00838f" stroke-width="1.8" stroke-dasharray="5,4"
        marker-end="url(#ah-teal-l)"/>
  <text x="1226" y="638" font-size="10" fill="#444">Tool call (Gemini → backend)</text>

  <line x1="1160" y1="660" x2="1216" y2="660" stroke="#34a853" stroke-width="2" stroke-dasharray="6,4"
        marker-end="url(#ah-grn)" marker-start="url(#ah-grn-l)"/>
  <text x="1226" y="664" font-size="10" fill="#444">Internal WebSocket (browser ↔ backend)</text>

  <text x="1376" y="686" text-anchor="middle" font-size="8" fill="#9e9e9e">TaleWeaver Architecture · v2026.03</text>

</svg>
